# Production-style compose for the pREST Python implementation.
#
# Mirrors docker-compose-prod.yml but uses the Python image + prestd CLI.
# External host port stays in the 20000-29999 range (project convention).
# Migrations are NOT run here — run the Go prestd binary separately
# (see docs/python-migrations.md) before bringing the API up.
services:
  postgres:
    image: postgres:16
    volumes:
      - "./data/postgres:/var/lib/postgresql/data"
    environment:
      - POSTGRES_USER=prest
      - POSTGRES_DB=prest
      - POSTGRES_PASSWORD=prest
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      retries: 3
  prest-python:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      - PREST_DEBUG=false
      - PREST_AUTH_ENABLED=true
      - PREST_PG_HOST=postgres
      - PREST_PG_USER=prest
      - PREST_PG_PASS=prest
      - PREST_PG_DATABASE=prest
      - PREST_PG_PORT=5432
      - PREST_SSL_MODE=disable
      - PREST_CACHE_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "23000:3000"