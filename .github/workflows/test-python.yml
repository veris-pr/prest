name: test-python
run-name: Python lint and unit tests

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:

jobs:
  python-unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv==0.6.3

      - name: Install locked dependencies
        run: uv sync --extra dev --locked

      - name: Lint Python
        run: uv run ruff check prest_py tests/python

      - name: Run Python tests
        run: uv run pytest tests/python -q
