services:
  prest-python:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      PREST_HTTP_HOST: 0.0.0.0
      PREST_HTTP_PORT: "3000"
    ports:
      - "23000:3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/_health', timeout=2).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
